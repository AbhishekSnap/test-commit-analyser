name: Analyse Commits

on:
  push:
    branches:
      - "**"      # Run on every push to any branch.
                  # To limit to specific branches, use e.g.: ["main", "develop"]

jobs:
  analyse:
    uses: AbhishekSnap/commit-analyser-mcp/.github/workflows/main.yml@main
    # Required: grant write access so the called workflow can update the Wiki.
    # A reusable workflow cannot elevate permissions beyond what the caller grants.
    permissions:
      contents: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}